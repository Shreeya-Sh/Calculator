version: 2.1

jobs:
  build:
    working_directory: ~/Calculator
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r requirements.txt
      - run:
          name: Run calculator
          command: python calculator.py

  test:
    working_directory: ~/calculator-circleci
    docker:
      - image: cimg/python:3.11
    steps:
      - checkout
      - run:
          name: Install dependencies
          command: pip install -r requirements.txt
      - run:
          name: Run tests
          command: pytest test_calculator.py -v

workflows:
  build_and_test:
    jobs:
      - build
      - test:
          requires:
            - build